{% set versions = {
    "2.2.16": "b2680da5682c78623635ae88a5ff5af346cf74c1be95ee9177e8f9080d418e76"
} %}

{% set version = environ.get('COMMIT_VERSION', None) %}
{% set version = version or versions.keys()|first %}
{% set version = version|string %}

{% set name = environ.get('ANACONDA_PACKAGE', 'sherpa')|string|lower %}

package:
  name: {{ name }}
  version: {{ environ.get('ANACONDA_VERSION', version)|replace("-", ".") }}

source:
  url: "https://gitlab.com/sherpa-team/sherpa/-/archive/v{{ version }}/sherpa-v{{ version }}.tar.gz"
  {% if versions.get(version, None) %}
  sha256: {{ versions.get(version) }}
  {% endif %}
  patches:
    - 0001-convert-print-statements-using-2to3.patch
    - 0002-remove-null-characters-for-prefix-replacement.patch

build:
  skip: true  # [not linux]
  number: 0

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - {{ compiler('gfortran') }}
    - gnuconfig
    - autoconf
    - libtool
    - make
    - automake
    - which
    - sed
    - diffutils
    - texinfo
  host:
    - sqlite
    # hep-forge's single `hepmc` package spans both HepMC2 and HepMC3 --
    # Sherpa 2.2.x needs the classic HepMC/ headers (2.06.11), not
    # HepMC3's HepMC3/ layout, so pin the line explicitly or the solver
    # picks the newer default (3.3.1).
    - lhapdf
    - hepmc 2.06.*
  run:
    - lhapdf
    - hepmc 2.06.*

test:
  requires:
    - lhapdf
    - hepmc 2.06.*
  commands:
    - test -f $PREFIX/bin/Sherpa
    - test -f $PREFIX/bin/Sherpa-config
    - Sherpa-config --version
    - Sherpa --help

about:
  home: "https://gitlab.com/sherpa-team/sherpa"
  license: "GPL-3.0-or-later"
  license_file: COPYING
  summary: "Sherpa: multi-purpose Monte Carlo event generator for particle physics"
  description: |
    Sherpa simulates high-energy reactions of particles in lepton-lepton,
    lepton-photon, photon-photon, lepton-hadron, and hadron-hadron collisions.

extra:
  recipe-maintainers:
    - meiyasan
